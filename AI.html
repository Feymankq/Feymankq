<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送给各位姐姐们 · 六一儿童节快乐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AI.css">
</head>
<body>
    <div class="bg-deco" aria-hidden="true">
        <span class="d1">♡</span>
        <span class="d2">✧</span>
        <span class="d3">★</span>
        <span class="d4">♡</span>
        <span class="d5">✿</span>
        <span class="d6">☆</span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <canvas id="matrix"></canvas>

    <header class="opening-dedication">
        <div class="card">
            <span class="badge">✿ 少女の祝福 ✿</span>
            <p class="lead">
                送给各位姐姐们，祝<span class="names">各位姐姐们</span>六一儿童节快乐！
            </p>
            <p class="heart-line">♡ 要甜甜哒、要开心哒、要一直被宠爱呀 ♡</p>
        </div>
    </header>

    <div class="love-message">
        <span class="sticker">★ 永远的好朋友 ★</span>
        <h1>姐姐们最可爱啦</h1>
        <div class="subtitle">把想说的话丢进糖果色的字符雨里吧～</div>
    </div>

    <div class="rain-input-panel">
        <span class="hint">✧ 输入会飘进甜甜的文字雨哦 ✧</span>
        <input type="text" id="rainTextInput" placeholder="写一句给姐姐们的话…" maxlength="80" />
        <button type="button" id="rainTextBtn">丢进雨里 ♡</button>
    </div>

    <script src="AI.js"></script>
</body>
</html>
